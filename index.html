<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porter v1.2 | Flagship</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>.scrollbar-hide::-webkit-scrollbar{display:none;}</style>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 font-sans min-h-screen">
<div class="max-w-2xl mx-auto space-y-4">
    <header class="border border-zinc-800 p-6 rounded-3xl bg-zinc-900 shadow-xl text-center">
        <h1 class="text-3xl font-black italic tracking-tighter text-blue-500 uppercase">Porter v1.2</h1>
        <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold tracking-[0.3em]">Privacy-First Data Migration</p>
    </header>

    <div class="border border-zinc-800 p-6 rounded-3xl bg-zinc-900 shadow-xl">
        <input type="file" id="zipInput" accept=".zip,application/zip,application/x-zip-compressed,application/octet-stream" class="block w-full text-xs text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white mb-2 cursor-pointer">
        <div id="status" class="text-[9px] font-mono text-zinc-500 italic uppercase text-center py-2 border-t border-zinc-800">Hull Integrity: Green. Awaiting Motor...</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="border border-zinc-800 rounded-3xl bg-zinc-900 p-4 shadow-inner">
            <h2 class="text-[10px] uppercase font-bold text-zinc-500 mb-3 border-b border-zinc-800 pb-2 text-center">Archive Map</h2>
            <div id="output" class="space-y-1 h-64 overflow-y-auto font-mono text-[9px] scrollbar-hide"></div>
        </div>
        <div class="border border-zinc-800 rounded-3xl bg-zinc-900 p-4 shadow-inner">
            <h2 class="text-[10px] uppercase font-bold text-blue-400 mb-3 border-b border-zinc-800 pb-2 text-center">Preview Pane</h2>
            <div id="preview" class="h-64 overflow-y-auto font-mono text-[9px] text-zinc-300 italic leading-relaxed">Select file from map...</div>
        </div>
    </div>

    <div class="border border-zinc-800 p-6 rounded-3xl bg-zinc-900 shadow-xl">
        <h2 class="text-[10px] uppercase font-bold text-green-500 mb-2">Nomination Basket</h2>
        <div id="basket" class="text-[10px] text-zinc-500 italic space-y-1">No items staged.</div>
    </div>
</div>
    
</body>
</html>
