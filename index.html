<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porter v1.2 | Shell</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 p-4 font-sans min-h-screen">
<div class="max-w-2xl mx-auto space-y-4">
<header class="border border-zinc-800 p-6 rounded-3xl bg-zinc-900 text-center">
<h1 class="text-3xl font-black italic text-blue-500">PORTER v1.2</h1>
</header>
<div class="border border-zinc-800 p-6 rounded-3xl bg-zinc-900">
<input type="file" id="zipInput" class="block w-full text-sm text-zinc-400 mb-4">
<div id="status" class="text-[10px] font-mono text-zinc-500 text-center py-2 border-t border-zinc-800">Awaiting Motor...</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="border border-zinc-800 rounded-3xl bg-zinc-900 p-4">
<div id="output" class="space-y-1 h-64 overflow-y-auto font-mono text-[10px]"></div>
</div>
<div class="border border-zinc-800 rounded-3xl bg-zinc-900 p-4">
<div id="preview" class="h-64 overflow-y-auto font-mono text-[10px] text-zinc-400 italic">...</div>
</div>
</div>
<div id="basket" class="border border-zinc-800 p-6 rounded-3xl bg-zinc-900 text-[10px] text-zinc-500 italic">Nomination Basket Empty</div>
</div>
</body>
</html>
